/* ==== render: buses (vertical columns) ==== */
function renderBuses() {
  if (IS_MOBILE()) return renderBusesMobile();
  const container = document.getElementById('routeLines');
  if (!lastActiveBus) { container.innerHTML = '<div class="empty">Loading active buses…</div>'; return; }
  const allBuses = ((lastActiveBus.ActiveBusResult || {}).activebus) || [];
  const byPlate = (lastBusPositions && lastBusPositions.byPlate) || {};
  const byRoute = (lastStopRoutes && lastStopRoutes.byRoute) || {};

  const configuredStops = new Set(getStops());

  const cols = INTERNAL_ROUTES.map((route) => {
    const stops = byRoute[route] || [];
    const { sequence, hasTerminals } = buildRouteSequence(route, stops);
    const buses = allBuses.filter((b) => b._route === route);

    // Map sequence index → array of approaching buses
    const stopToBuses = {};
    const orphans = [];
    for (const b of buses) {
      const upcoming = byPlate[b.vehplate] || [];
      const next = upcoming.find((u) => u.route === route && sequence.includes(u.stop));
      if (next) {
        const idx = sequence.indexOf(next.stop);
        (stopToBuses[idx] = stopToBuses[idx] || []).push({ bus: b, etaS: next.eta_s });
      } else {
        orphans.push(b);
      }
    }
    // Sort approaching buses at each stop by etaS ascending
    for (const k of Object.keys(stopToBuses)) {
      stopToBuses[k].sort((a, b) => a.etaS - b.etaS);
    }

    const stopsHtml = sequence.length
      ? sequence.map((s, i) => {
          const isTerminal = hasTerminals && (i === 0 || i === sequence.length - 1);
          const arriving = stopToBuses[i] || [];
          const chips = arriving.map((p) => busChipHtml(p.bus, p.etaS)).join('');
          const compactCls = arriving.length >= 2 ? 'compact' : '';
          const mrtIcon = MRT_STOPS.has(s)
            ? '<i class="fa-solid fa-train-subway mrt-icon" title="MRT station"></i>'
            : '';
          const termIcon = TERMINAL_STOPS.has(s)
            ? '<i class="fa-solid fa-flag-checkered terminal-stop-icon" title="Bus terminal"></i>'
            : '';
          const isSelected = configuredStops.has(s);
          const rowCls = [
            'stop-row',
            isTerminal ? 'terminal' : '',
            isSelected ? 'selected' : '',
          ].filter(Boolean).join(' ');
          return `<div class="${rowCls}">
            <div class="stop-dot"></div>
            <div class="stop-name" title="${escapeHtml(s)}">${termIcon}${mrtIcon}${escapeHtml(s)}</div>
            ${chips ? `<div class="stop-buses ${compactCls}">${chips}</div>` : ''}
          </div>`;
        }).join('')
      : '<div class="empty" style="padding:0.5rem; font-size:0.7rem;">No stops mapped</div>';

    const orphanHtml = orphans.length
      ? `<div class="route-orphans">
          <div class="route-orphans-label">unknown next stop</div>
          ${orphans.map((b) => busChipHtml(b, null)).join('')}
         </div>` : '';

    const sched = ROUTE_SCHEDULE[route];
    const hdrTip = (ROUTE_DESCRIPTION[route] || '') + (sched
      ? ` · Wkd ${sched.wk}` + (sched.sat ? ` · Sat ${sched.sat}` : '') +
        (sched.sun ? ` · Sun ${sched.sun}` : '') +
        (sched.freq ? ` · ${sched.freq}` : '')
      : '');
    const nextDep = nextDeparture(route);
    const nextDepHtml = nextDep ? `<div class="next-dep">${nextDep === 'ended' ? 'service ended' : '→ ' + escapeHtml(nextDep)}</div>` : '';
    return `<div class="route-col" data-route="${escapeHtml(route)}">
      <div class="route-col-head" title="${escapeHtml(hdrTip)}">
        <div class="name">${escapeHtml(route)}</div>
        <div class="count">${buses.length} bus${buses.length === 1 ? '' : 'es'}</div>
        ${nextDepHtml}
      </div>
      <div class="route-col-stops">
        ${stopsHtml}
      </div>
      ${orphanHtml}
    </div>`;
  }).join('');

  container.innerHTML = cols;
}

/* ==== render: announcements ==== */
function renderAnnouncements() {
  const card = document.getElementById('announcementsCard');
  const hide = () => { if (card) card.style.display = 'none'; refreshUpdatesEmpty(); };
  if (!lastAnnouncements) return hide();
  const list = ((lastAnnouncements.AnnouncementsResult && lastAnnouncements.AnnouncementsResult.Announcement) || [])
    .filter(a => a.Status === 'Enabled');
  const el = document.getElementById('announcements');
  if (!list.length) return hide();
  if (card) card.style.display = '';
  el.innerHTML = list.map(a => `
    <div class="announcement">
      <div>${a.Text}</div>
      <div class="ann-meta">
        <i class="fa-regular fa-calendar"></i> ${escapeHtml(fmtRelative(a.Created_On))}
      </div>
    </div>`).join('');
  refreshUpdatesEmpty();
}

/* ==== central render trigger ==== */
function renderAll() {
  renderShuttles();
  renderTickers();
  renderMap();
  renderBuses();
  renderAnnouncements();
}

/* ==== refresh / load ==== */
const REFRESH_INTERVAL_MS = 30000;
let lastRefreshAt = 0;

function tickFetchWedge() {
  const wedge = document.getElementById('fetchWedge');
  if (!wedge) return;
  const elapsed = Date.now() - lastRefreshAt;
  const progress = Math.min(100, (elapsed / REFRESH_INTERVAL_MS) * 100);
  wedge.style.setProperty('--progress', progress.toFixed(0));
  const remaining = Math.max(0, Math.round((REFRESH_INTERVAL_MS - elapsed) / 1000));
  wedge.title = remaining > 0 ? `Next refresh in ${remaining}s` : 'Refreshing…';
}

// TickerTapes is ~106 KB and only used by the Updates view, so it's fetched
// lazily (on first Updates open) instead of blocking every load's first paint.
let tickersLoaded = false, tickersLoading = false;
async function ensureTickers(force) {
  if (tickersLoading || (tickersLoaded && !force)) return;
  tickersLoading = true;
  try { lastTickers = await loadJSON(apiUrl('/api/TickerTapes')); tickersLoaded = true; renderTickers(); }
  catch (e) { console.warn('TickerTapes', e.message); }
  finally { tickersLoading = false; }
}

// Nearby stops (from geolocation) that aren't already tracked. Shown as extra
// cards at the top of the mobile Stops view and fetched alongside tracked stops,
// but NOT counted toward MAX_STOPS.
function getNearStops() {
  const tracked = new Set(getStops());
  return geoNearestList.map((n) => n.stop).filter((s) => !tracked.has(s));
}
// Every stop whose live data we fetch: tracked ∪ nearby (deduped, tracked first).
function getFetchStops() {
  const out = [...getStops()];
  for (const s of getNearStops()) if (!out.includes(s)) out.push(s);
  return out;
}

async function refresh() {
  lastRefreshAt = Date.now();
  const stops = getFetchStops();   // tracked + nearby (nearby aren't in MAX_STOPS)
  // Drop cached data for stops we no longer track or that aren't nearby anymore
  for (const k of Object.keys(lastShuttles)) {
    if (!stops.includes(k)) { delete lastShuttles[k]; delete shuttleFetchedAt[k]; }
  }
  if (API_BASE) await refreshBootstrap(stops);   // prod: one Apps Script call
  else          await refreshIndividual(stops);  // dev: local Node server, per-endpoint
  renderAll();
  // Keep alerts fresh only while they matter (Updates open, or already fetched).
  if (currentView === 'updates' || tickersLoaded) ensureTickers(true);
}

// Prod path: a single /api/bootstrap call returns shuttles + activeBus +
// busPositions + stopRoutes + announcements in one round-trip (TickerTapes is lazy).
async function refreshBootstrap(stops) {
  try {
    const b = await loadJSON(apiUrl('/api/bootstrap?stops=' + encodeURIComponent(stops.join(','))));
    const now = Date.now();
    if (b.shuttles) for (const s of stops) {
      if (b.shuttles[s]) { lastShuttles[s] = b.shuttles[s]; shuttleFetchedAt[s] = now; }
    }
    if (b.activeBus)     lastActiveBus     = b.activeBus;
    if (b.busPositions)  lastBusPositions  = b.busPositions;
    if (b.stopRoutes)    lastStopRoutes    = b.stopRoutes;
    if (b.announcements) lastAnnouncements = b.announcements;
    const t = b.activeBus && b.activeBus.ActiveBusResult && b.activeBus.ActiveBusResult.TimeStamp;
    if (t) latestTs = t;
  } catch (e) { console.warn('bootstrap', e.message); }
}

// Dev path: the local Node server has no bootstrap endpoint, so call each
// endpoint (in parallel). TickerTapes stays lazy here too.
async function refreshIndividual(stops) {
  const tasks = [
    ...stops.map(stop => [
      `/api/ShuttleService?stop=${encodeURIComponent(stop)}`,
      (d) => { lastShuttles[stop] = d; shuttleFetchedAt[stop] = Date.now(); },
    ]),
    ['/api/ActiveBus',     (d) => lastActiveBus = d],
    ['/api/Announcements', (d) => lastAnnouncements = d],
    ['/api/BusPositions',  (d) => lastBusPositions = d],
    ['/api/StopRoutes',    (d) => lastStopRoutes = d],
  ];
  let ts = null;
  await Promise.all(tasks.map(async ([url, save]) => {
    try {
      const data = await loadJSON(apiUrl(url));
      save(data);
      const k = data && Object.keys(data)[0];
      const t = data && k && data[k] && data[k].TimeStamp;
      if (t && (!ts || new Date(t) > new Date(ts))) ts = t;
    } catch (e) { console.warn(url, e.message); }
  }));
  if (ts) latestTs = ts;
}
async function loadConfig() {
  // Production (GitHub Pages → Apps Script) has no /api/config and is always prod,
  // which keeps the dev-only chrome hidden.
  if (API_BASE) { document.body.setAttribute('data-mode', 'prod'); return; }
  try {
    const r = await fetch('/api/config');
    if (!r.ok) return;
    const cfg = await r.json();
    const mode = (cfg && cfg.mode === 'prod') ? 'prod' : 'dev';
    document.body.setAttribute('data-mode', mode);
  } catch { /* leave data-mode as unknown — dev-only stays hidden */ }
}
async function loadStopRoutes() {
  try { lastStopRoutes = await loadJSON(apiUrl('/api/StopRoutes')); renderAll(); }
  catch (e) { console.warn('StopRoutes', e.message); }
}
async function loadStopCoords() {
  // Stops don't move, so production serves a frozen snapshot file instead of the
  // live-accumulating /api/StopCoords (which has no Apps Script equivalent).
  try {
    const data = API_BASE
      ? await loadJSON('./stop-coords.json')
      : await loadJSON('/api/StopCoords');
    lastStopCoords = data.stops || {};
    if (currentView === 'map') renderMap();
  } catch (e) { console.warn('StopCoords', e.message); }
}
async function loadRouteGeometry() {
  try {
    const r = await fetch('/route-geometry.json?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) return; // file missing → fall back to straight lines
    lastRouteGeometry = await r.json();
    if (currentView === 'map') renderMap();
  } catch (e) { console.warn('RouteGeometry', e.message); }
}

/* ==== render: diagnostics ==== */
let diagLoading = false;
async function renderDiagnostics() {
  const el = document.getElementById('diagBody');
  if (!el || diagLoading) return;
  diagLoading = true;
  el.innerHTML = '<div class="empty">Running health check…</div>';
  let h;
  try {
    h = await loadJSON(apiUrl('/api/health'));
  } catch (e) {
    el.innerHTML = `<div class="diag-banner st-fail"><span class="st-dot st-fail"></span> Backend unreachable — ${escapeHtml(e.message)}
      <button class="diag-refresh" id="diagRefreshBtn"><i class="fa-solid fa-arrows-rotate"></i> Retry</button></div>`;
    document.getElementById('diagRefreshBtn')?.addEventListener('click', renderDiagnostics);
    diagLoading = false;
    return;
  }
  diagLoading = false;

  const overall = h.ok ? 'ok' : (h.tokenValid ? 'auth' : 'fail');
  const overallText = h.ok ? 'All systems operational'
    : (h.tokenValid ? 'Degraded — some endpoints failing'
                    : 'Token invalid or upstream down — re-capture NEXTBUS_FMS_TOKEN (see docs/RECAPTURE-FMS-TOKEN.md)');

  const secretRows = (h.secrets || []).map(s => {
    let valCell, statusBadge;
    if (s.public) {
      valCell = `<code>${escapeHtml(s.value ?? '—')}</code> <span class="diag-badge st-muted">public</span>`;
      statusBadge = s.set ? '<span class="diag-badge st-ok">set</span>' : '<span class="diag-badge st-fail">missing</span>';
    } else {
      valCell = s.set ? `<code>${escapeHtml(s.masked ?? '••••')}</code>` : '<span class="diag-badge st-fail">not set</span>';
      statusBadge = !s.set ? '<span class="diag-badge st-fail">missing</span>'
        : (s.valid ? '<span class="diag-badge st-ok">valid</span>' : '<span class="diag-badge st-auth">rejected</span>');
    }
    return `<tr>
      <td><code>${escapeHtml(s.key)}</code>${s.required ? ' <span class="diag-badge st-muted">required</span>' : ''}</td>
      <td>${valCell}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');

  const checkRows = (h.checks || []).map(c => {
    const st = c.status === 'ok' ? 'ok' : c.status === 'auth' ? 'auth' : 'fail';
    return `<tr>
      <td><span class="st-dot st-${st}"></span> ${escapeHtml(c.label)}
        ${c.detail ? `<div class="diag-detail">${escapeHtml(c.detail)}</div>` : ''}</td>
      <td><span class="diag-badge st-${st}">${st}</span></td>
      <td><code>${Number(c.latencyMs) || 0}ms</code></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="diag-banner st-${overall}">
      <span class="st-dot st-${overall}"></span> ${escapeHtml(overallText)}
      <button class="diag-refresh" id="diagRefreshBtn" title="Re-run health check"><i class="fa-solid fa-arrows-rotate"></i> Recheck</button>
    </div>
    <div class="diag-meta" style="margin:0 0 1rem 0;">
      <span>API base: <code>${escapeHtml(API_BASE || '(same origin)')}</code></span>
      <span>Upstream: <code>${escapeHtml(h.upstreamBase || '—')}</code></span>
      <span>Mode: <code>${escapeHtml(h.mode || '—')}</code></span>
      <span>Checked: <code>${escapeHtml(fmtTime(h.fetchedAt))}</code></span>
    </div>
    <section class="card">
      <div class="card-header"><i class="fa-solid fa-key"></i> Secrets &amp; configuration</div>
      <div class="card-body">
        <table class="diag-table">
          <thead><tr><th>Key</th><th>Value</th><th>Status</th></tr></thead>
          <tbody>${secretRows || '<tr><td colspan="3" class="empty">none</td></tr>'}</tbody>
        </table>
      </div>
    </section>
    <section class="card">
      <div class="card-header"><i class="fa-solid fa-plug-circle-check"></i> Upstream endpoint checks</div>
      <div class="card-body">
        <table class="diag-table">
          <thead><tr><th>Endpoint</th><th>Status</th><th>Latency</th></tr></thead>
          <tbody>${checkRows || '<tr><td colspan="3" class="empty">none</td></tr>'}</tbody>
        </table>
      </div>
    </section>`;

  document.getElementById('diagRefreshBtn')?.addEventListener('click', renderDiagnostics);
}

renderStopChips();
// Add a stop by name (used by the "nearest stop → Track" button). The picker
// handles the general add/remove flow.
function tryAddStop(v) {
  if (!v) return;
  const stops = getStops();
  if (stops.includes(v) || stops.length >= MAX_STOPS) return;
  setStops([...stops, v]);
  renderStopChips();
  renderShuttles();
  refresh();
}
const stopChipsEl = document.getElementById('stopChips');
stopChipsEl.addEventListener('click', (e) => {

  const btn = e.target.closest('button[data-remove]');
  if (!btn) return;
  const s = btn.dataset.remove;
  setStops(getStops().filter((x) => x !== s));
  renderStopChips();
  renderShuttles();
  refresh();
});
// Stops are now added via the fullscreen picker (opened by the "Add stop" chip);

document.getElementById('tabs').addEventListener('click', (e) => {

// Mobile stop chips live inside the Shuttle view (#depBoard) — mirror the header
// chip handlers (remove on ✕, add on Enter or datalist selection).

depBoardEl.addEventListener('click', (e) => {
  const del = e.target.closest('[data-remove-card]');
  if (del) { startRemoveConfirm(del.dataset.removeCard); return; }
  const yes = e.target.closest('[data-confirm-yes]');
  if (yes) { confirmRemove(yes.dataset.confirmYes); return; }
  const no = e.target.closest('[data-confirm-no]');
  if (no) { cancelRemoveConfirm(no.dataset.confirmNo); return; }
  if (e.target.closest('[data-open-picker]')) { openStopPicker(); return; }
  if (e.target.closest('[data-install]')) { doInstall(); return; }
  if (e.target.closest('[data-install-dismiss]')) {

    try { sessionStorage.setItem('isb-install-x', '1'); } catch (err) {}
    renderShuttlesMobile(); return;

  if (nearAdd) { tryAddStop(nearAdd.dataset.nearAdd); return; }
  if (e.target.closest('[data-geo-enable]')) { geoState = 'idle'; startGeo(); return; }
  if (e.target.closest('[data-compass]')) { enableCompass(); return; }
  const exp = e.target.closest('[data-expand]');

// Stop picker: card toggle + close (Esc / ✕ / Done / 15s idle).
(() => {
  const picker = document.getElementById('stopPicker');

    const b = e.target.closest('[data-pick]');

})();

// Left/Right arrow keys cycle through views (skip when typing in a form field).
const VIEW_ORDER = ['shuttle', 'buses', 'map', 'updates', 'diagnostics'];
document.addEventListener('keydown', (e) => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
  e.preventDefault();
  const i = Math.max(0, VIEW_ORDER.indexOf(currentView));
  const len = VIEW_ORDER.length;
  const next = e.key === 'ArrowRight'
    ? VIEW_ORDER[(i + 1) % len]
    : VIEW_ORDER[(i - 1 + len) % len];
  switchView(next);
});

// Data loading + polling start only after the AHL sign-in gate is cleared
// (ahlAuth() calls startApp on success). Guarded so it runs at most once.
let __appStarted = false;
function startApp() {
  if (__appStarted) return;
  __appStarted = true;
  loadConfig();
  refresh();                 // bootstrap (prod) now includes StopRoutes
  loadStopCoords();
  if (IS_MOBILE()) startGeo();   // nearest-stop compass (asks for location permission)
  loadRouteGeometry();
  loadMapMeta();
  setInterval(refresh, REFRESH_INTERVAL_MS);
  setInterval(loadStopCoords, 60000);
  setInterval(tickShuttleTimes, 1000);
  setInterval(tickFetchWedge, 500);
}

renderRouteToggles();

/* ==== AHL sign-in gate (Apps Script member-login broker) ====
   Same pattern as new.ahlab.org: no GCP OAuth client. A full-page redirect to
   the shared AHL broker (ahl-site-appscript) reads the visitor's Workspace
   identity server-side via Session.getActiveUser(), then redirects back to
   /auth-callback/ with the identity in the URL fragment. Only @ahlab.org members
   get past the broker; everyone else hits its "Not an AHLab member" page.

   This gates the UI only — the bus-data proxy stays ANYONE_ANONYMOUS so the
   browser can still fetch() it cross-origin. The session lives in localStorage
   (7-day TTL); /auth-callback/ writes it. See README → "AHL sign-in gate".

   Backend setup (one-time): add https://nusisb.ahlab.org/auth-callback/ to
   ALLOWED_RETURN_URLS in ahl-site-appscript/Code.js and redeploy the broker. */
const AHL_BROKER_URL  = 'https://script.google.com/a/macros/ahlab.org/s/AKfycbwHPIr3JR0ZQ9471E1W0KqM-BggXLv8g8wvx0Z3Qwjx2HajD71gBf60CxrJBcrN_51T/exec';
const AHL_DOMAIN      = 'ahlab.org';
const AHL_SESSION_KEY = 'ahl-auth-v1';        // identity cache (localStorage) — must match auth-callback
const AHL_NONCE_KEY   = 'ahl-auth-nonce-v1';  // in-flight round-trip state (localStorage)
const AHL_RETURN_KEY  = 'ahl-auth-return-v1';
const AHL_SESSION_TTL_MS = 7 * 24 * 60 * 60 * 1000;  // 7 days — matches broker token TTL

// Session is cached in localStorage (not sessionStorage) so returning visitors
// on the same browser skip the gate entirely until the 7-day TTL lapses.
// Expired/foreign sessions are dropped so the next load re-prompts cleanly.
function ahlGetSession() {
  try {
    const s = JSON.parse(localStorage.getItem(AHL_SESSION_KEY) || 'null');
    const fresh = s && typeof s.ts === 'number' && (Date.now() - s.ts) < AHL_SESSION_TTL_MS;
    if (s && fresh && typeof s.email === 'string' && s.email.toLowerCase().endsWith('@' + AHL_DOMAIN)) return s;
    if (s) localStorage.removeItem(AHL_SESSION_KEY);
  } catch (e) {}
  return null;
}

function ahlGrant() {
  document.body.classList.add('ahl-authed');
  startApp();
}

function ahlNonce() {
  try {
    const buf = new Uint8Array(16);
    crypto.getRandomValues(buf);
    return Array.prototype.map.call(buf, (b) => ('0' + b.toString(16)).slice(-2)).join('');
  } catch (e) {
    return Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
  }
}

// Full-page redirect to the broker. It bounces back to /auth-callback/ which
// stores the identity and returns the tab to '/', where ahlGrant() reveals the app.
function ahlLogin() {
  const nonce = ahlNonce();
  try {
    localStorage.setItem(AHL_NONCE_KEY, nonce);
    localStorage.setItem(AHL_RETURN_KEY, '/');
  } catch (e) {
    alert('Your browser blocked site storage. Sign-in needs localStorage — please try a regular (non-private) window.');
    return;
  }
  const callback = location.origin + '/auth-callback/';
  const url = AHL_BROKER_URL +
    (AHL_BROKER_URL.indexOf('?') === -1 ? '?' : '&') +
    'return=' + encodeURIComponent(callback) +
    '&nonce=' + encodeURIComponent(nonce);
  location.assign(url);
}

// Boot the gate (desktop + mobile): a live session reveals the app immediately;
// otherwise the sign-in button waits for a click.
if (ahlGetSession()) {
  ahlGrant();
} else {
  document.getElementById('gateBtn')?.addEventListener('click', ahlLogin);
}

if ('serviceWorker' in navigator) {
  addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((e) => console.warn('SW register failed:', e));
  });
}
