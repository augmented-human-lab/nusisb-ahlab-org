<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUS ISB — Mobile UI mockups</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<!--
  STANDALONE MOCKUP — not wired to the app or any data. Pure HTML/CSS to explore
  a phone-native redesign of every NUS ISB view. Each phone is fully interactive:
  tap the bottom nav to switch views. The five frames default to different views
  so the whole app is visible at a glance.
-->
<style>
  :root {
    --primary: #003d7c;
    --primary-soft: #00509e;
    --accent: #ef7c00;
    --bg: #f3f5f8;
    --card: #ffffff;
    --border: #e7ebf1;
    --text: #1a2433;
    --muted: #6b7785;
    --high: #d94652;
    --med: #f0944a;
    --low: #2a9d8f;
    --shadow: 0 1px 2px rgba(16,24,40,.04), 0 6px 16px rgba(16,24,40,.06);
  }
  /* route colours — from the app */
  .r-A1{background:#d62828}.r-A2{background:#eab308;color:#1a2433 !important}
  .r-D1{background:#a855f7}.r-D2{background:#581c87}.r-K{background:#1e40af}
  .r-P{background:#4b5563}.r-R1{background:#f97316}.r-R2{background:#16a34a}

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #aeb6c2 radial-gradient(120% 100% at 50% 0%, #c3cad6, #93a0b3);
    color: var(--text); padding: 40px 24px 64px; -webkit-font-smoothing: antialiased;
  }
  .page-head { text-align: center; color: #1a2433; margin-bottom: 34px; }
  .page-head h1 { font-size: 26px; font-weight: 800; letter-spacing: -.02em; }
  .page-head p { color: #41506a; font-size: 14px; margin-top: 6px; }
  .page-head .tag { display:inline-block; margin-top:12px; padding:5px 14px; border-radius:999px;
    background:#003d7c; color:#fff; font-size:12px; font-weight:600; letter-spacing:.03em; }

  .gallery { display: flex; flex-wrap: wrap; gap: 40px 34px; justify-content: center; align-items: flex-start; }
  .frame { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .frame > .cap { font-size: 13px; font-weight: 700; color: #1f2a3d; letter-spacing: .02em; }
  .frame > .cap span { color: #5a6678; font-weight: 500; }

  /* ── device ── */
  .phone {
    width: 384px; height: 812px; border-radius: 52px; background: #0b0e14;
    padding: 13px; box-shadow: 0 30px 70px rgba(10,18,35,.42), 0 4px 12px rgba(10,18,35,.3);
    position: relative; flex: 0 0 auto;
  }
  .screen {
    width: 100%; height: 100%; border-radius: 40px; overflow: hidden; background: var(--bg);
    position: relative; display: flex; flex-direction: column;
  }
  .notch { position:absolute; top:13px; left:50%; transform:translateX(-50%); width:130px; height:30px;
    background:#0b0e14; border-radius:0 0 18px 18px; z-index:60; }

  /* status bar */
  .statusbar { height: 50px; flex: 0 0 auto; display:flex; align-items:flex-end; justify-content:space-between;
    padding: 0 26px 6px; font-size: 14px; font-weight: 600; color: var(--text); background: var(--primary);
    color:#fff; }
  .statusbar .sb-r { display:flex; gap:6px; align-items:center; font-size:13px; }

  /* app bar */
  .appbar { flex: 0 0 auto; background: var(--primary);
    background: linear-gradient(135deg, var(--primary), var(--primary-soft));
    color:#fff; padding: 4px 18px 14px; display:flex; align-items:center; gap:10px; }
  .appbar .brand { font-size: 19px; font-weight: 800; letter-spacing:-.01em; display:flex; align-items:center; gap:9px; }
  .appbar .brand i { color: var(--accent); }
  .appbar .spacer { flex:1; }
  .appbar .live { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; opacity:.92;
    background: rgba(255,255,255,.14); padding:5px 10px; border-radius:999px; }
  .appbar .live .dot { width:7px; height:7px; border-radius:50%; background:#5ce08a; box-shadow:0 0 0 3px rgba(92,224,138,.25); }
  .appbar .ic { width:34px;height:34px;border-radius:50%; background:rgba(255,255,255,.14); display:flex;align-items:center;justify-content:center; font-size:15px; }

  /* scroll area */
  .scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .scroll::-webkit-scrollbar{ display:none; }
  .pad { padding: 14px 14px 90px; }
  .sec-title { font-size: 12px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted);
    margin: 6px 4px 10px; display:flex; align-items:center; gap:8px; }
  .sec-title .count { margin-left:auto; text-transform:none; letter-spacing:0; font-weight:600; color:var(--muted); }

  .rb { flex:0 0 auto; width:34px; height:34px; border-radius:9px; color:#fff; font-weight:800; font-size:14px;
    display:flex; align-items:center; justify-content:center; }
  .rb.sm { width:26px; height:26px; font-size:12px; border-radius:7px; }

  /* bottom nav */
  .tabbar { position:absolute; left:0; right:0; bottom:0; height:74px; background: rgba(255,255,255,.94);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top:1px solid var(--border);
    display:flex; padding: 6px 6px 20px; z-index:50; }
  .tab { flex:1; border:0; background:none; cursor:pointer; display:flex; flex-direction:column; align-items:center;
    gap:4px; padding:6px 0; color:var(--muted); font-size:10.5px; font-weight:600; font-family:inherit; }
  .tab i { font-size:18px; }
  .tab.active { color: var(--primary); }
  .tab.active i { transform: translateY(-1px); }

  /* segmented / chips */
  .chips { display:flex; gap:8px; overflow-x:auto; padding: 2px 4px 14px; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip { flex:0 0 auto; padding:7px 13px; border-radius:999px; background:var(--card); border:1px solid var(--border);
    font-size:13px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:7px; box-shadow:var(--shadow); }
  .chip.on { background: var(--primary); color:#fff; border-color:var(--primary); }
  .chip .sw { width:11px; height:11px; border-radius:3px; }

  /* ── Shuttle / departures ── */
  .stopcard { background:var(--card); border-radius:18px; box-shadow:var(--shadow); margin-bottom:14px; overflow:hidden; }
  .stopcard-head { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--border); }
  .stopcard-head .nm { font-size:17px; font-weight:800; }
  .stopcard-head .sub { font-size:12.5px; color:var(--muted); }
  .stopcard-head .pin { margin-left:auto; color:var(--accent); font-size:15px; }
  .deprow { display:flex; align-items:center; gap:13px; padding:13px 16px; }
  .deprow + .deprow { border-top:1px solid #f0f3f7; }
  .deprow .mid { flex:1; min-width:0; }
  .deprow .mid .dir { font-size:14.5px; font-weight:700; }
  .deprow .mid .via { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .deprow .eta { text-align:right; flex:0 0 auto; }
  .deprow .eta .big { font-size:25px; font-weight:800; color:var(--accent); line-height:1; font-feature-settings:'tnum'; }
  .deprow .eta .big.soon { color: var(--high); }
  .deprow .eta .unit { font-size:11px; color:var(--muted); font-weight:700; }
  .deprow .eta .then { font-size:11px; color:var(--muted); margin-top:3px; }
  .deprow.arr { background:#fafbfd; }
  .deprow.arr .eta .big { color: var(--primary); font-size:20px; }

  /* ── Buses ── */
  .routeblk { background:var(--card); border-radius:16px; box-shadow:var(--shadow); margin-bottom:13px; overflow:hidden; }
  .routeblk-head { display:flex; align-items:center; gap:11px; padding:11px 14px; color:#fff; }
  .routeblk-head .t { font-weight:800; font-size:15px; }
  .routeblk-head .d { font-size:11.5px; opacity:.9; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .routeblk-head .n { margin-left:auto; font-size:12px; font-weight:700; background:rgba(0,0,0,.18); padding:3px 9px; border-radius:999px; white-space:nowrap; }
  .busrow { display:flex; align-items:center; gap:11px; padding:11px 14px; }
  .busrow + .busrow { border-top:1px solid #f0f3f7; }
  .busrow .plate { font-family:ui-monospace,Menlo,monospace; font-weight:700; font-size:13px; background:#eef1f5;
    padding:4px 8px; border-radius:7px; flex:0 0 auto; }
  .busrow .to { flex:1; min-width:0; font-size:13.5px; }
  .busrow .to b { font-weight:700; }
  .busrow .to small { color:var(--muted); }
  .busrow .st { font-size:11px; font-weight:700; display:flex; align-items:center; gap:5px; flex:0 0 auto; }
  .busrow .st .d2 { width:8px; height:8px; border-radius:50%; }
  .st.moving .d2{ background:#16a34a; } .st.moving{ color:#16a34a; }
  .st.stopped .d2{ background:#9aa3b0; } .st.stopped{ color:#8a93a1; }
  .busrow .et { font-size:14px; font-weight:800; color:var(--accent); font-feature-settings:'tnum'; flex:0 0 auto; min-width:42px; text-align:right; }

  /* ── Map ── */
  .mapwrap { position:absolute; inset:0; }
  .mapwrap img { width:100%; height:100%; object-fit:cover; }
  .mapwrap svg { position:absolute; inset:0; width:100%; height:100%; }
  .busdot { position:absolute; width:26px; height:26px; border-radius:50%; color:#fff; font-weight:800; font-size:11px;
    display:flex; align-items:center; justify-content:center; transform:translate(-50%,-50%);
    border:2.5px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.4); }
  .map-fab { position:absolute; right:16px; width:46px; height:46px; border-radius:14px; background:#fff;
    box-shadow:0 3px 10px rgba(0,0,0,.22); display:flex; align-items:center; justify-content:center; color:var(--primary); font-size:17px; }
  .map-chips { position:absolute; left:0; right:0; bottom:88px; display:flex; gap:8px; overflow-x:auto; padding:0 14px; }
  .map-chips::-webkit-scrollbar{ display:none; }
  .map-stamp { position:absolute; left:14px; top:14px; background:rgba(11,14,20,.6); color:#fff; font-size:11px;
    padding:5px 10px; border-radius:999px; backdrop-filter:blur(4px); }

  /* ── Updates ── */
  .card2 { background:var(--card); border-radius:16px; box-shadow:var(--shadow); margin-bottom:14px; overflow:hidden; }
  .card2-head { display:flex; align-items:center; gap:9px; padding:13px 16px; font-weight:700; font-size:14px; border-bottom:1px solid var(--border); }
  .card2-head i { color:var(--primary); }
  .alert { padding:13px 16px; border-left:4px solid var(--low); }
  .alert + .alert { border-top:1px solid #f0f3f7; }
  .alert.high { border-left-color:var(--high); } .alert.med { border-left-color:var(--med); }
  .alert .msg { font-size:13.5px; line-height:1.5; }
  .alert .meta { display:flex; gap:8px; align-items:center; margin-top:8px; font-size:11px; color:var(--muted); flex-wrap:wrap; }
  .badge { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; padding:3px 8px; border-radius:6px; color:#fff; }
  .badge.high{background:var(--high)} .badge.med{background:var(--med)} .badge.low{background:var(--low)}
  .ann { padding:13px 16px; } .ann + .ann { border-top:1px solid #f0f3f7; }
  .ann .t { font-size:13.5px; font-weight:600; } .ann .w { font-size:11.5px; color:var(--muted); margin-top:4px; }

  /* ── Health ── */
  .banner { border-radius:14px; padding:15px 16px; color:#fff; display:flex; align-items:center; gap:12px; margin-bottom:16px;
    background:linear-gradient(135deg,#16a34a,#15803d); box-shadow:var(--shadow); }
  .banner i { font-size:22px; } .banner .t { font-weight:700; font-size:15px; } .banner .s { font-size:12px; opacity:.9; }
  .hrow { display:flex; align-items:center; gap:11px; padding:13px 16px; background:var(--card); }
  .hrow:first-of-type { border-radius:14px 14px 0 0; } .hrow:last-of-type { border-radius:0 0 14px 14px; }
  .hrow + .hrow { border-top:1px solid #f0f3f7; }
  .hrow .lbl { flex:1; font-size:13.5px; font-weight:600; }
  .hrow .lbl small { display:block; color:var(--muted); font-weight:400; font-family:ui-monospace,Menlo,monospace; font-size:11px; margin-top:2px; }
  .hrow .lat { font-size:12px; color:var(--muted); font-family:ui-monospace,Menlo,monospace; }
  .pill { font-size:10px; font-weight:800; text-transform:uppercase; padding:3px 8px; border-radius:6px; }
  .pill.ok{ background:#dcfce7; color:#15803d; } .pill.valid{ background:#dbeafe; color:#1e40af; }
  .stack { box-shadow:var(--shadow); border-radius:14px; margin-bottom:16px; overflow:hidden; }

  /* view visibility within a phone */
  .view { display:none; height:100%; }
  .view.show { display:block; }
  .view.v-map { position:absolute; inset:0; }
</style>
</head>
<body>
  <div class="page-head">
    <h1>NUS ISB — Mobile UI</h1>
    <p>Phone-native redesign of every view. Tap the bottom nav on any phone to explore.</p>
    <span class="tag">MOCKUP · not wired to data · main app untouched</span>
  </div>
  <div class="gallery" id="gallery"></div>

<script>
const NAV = [
  { k:'shuttle', label:'Shuttle', icon:'fa-route' },
  { k:'buses',   label:'Buses',   icon:'fa-bus' },
  { k:'map',     label:'Map',     icon:'fa-map-location-dot' },
  { k:'updates', label:'Updates', icon:'fa-bell' },
  { k:'health',  label:'Health',  icon:'fa-heart-pulse' },
];

function statusbar(){
  return `<div class="statusbar"><span>9:41</span>
    <span class="sb-r"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></span></div>`;
}
function appbar(title, sub){
  return `<div class="appbar">
    <div class="brand"><i class="fa-solid fa-bus"></i> NUS ISB</div>
    <div class="spacer"></div>
    <div class="live"><span class="dot"></span> live · 8s</div>
    <div class="ic"><i class="fa-solid fa-arrows-rotate"></i></div>
  </div>`;
}
function tabbar(active){
  return `<div class="tabbar">` + NAV.map(n =>
    `<button class="tab ${n.k===active?'active':''}" data-go="${n.k}">
       <i class="fa-solid ${n.icon}"></i><span>${n.label}</span></button>`).join('') + `</div>`;
}

/* ---- view: Shuttle (saved-stop departure list) ---- */
function deprow(r, dir, via, eta, soon, then, arr){
  return `<div class="deprow ${arr?'arr':''}">
    <div class="rb r-${r}">${r}</div>
    <div class="mid"><div class="dir">${arr?'<i class="fa-solid fa-arrow-down-long" style="color:#8a93a1"></i> ':''}${dir}</div><div class="via">${via}</div></div>
    <div class="eta"><span class="big ${soon?'soon':''}">${eta}</span> <span class="unit">min</span>${then?`<div class="then">then ${then}</div>`:''}</div>
  </div>`;
}
function viewShuttle(){
  return `<div class="scroll"><div class="pad">
    <div class="chips">
      <span class="chip on"><i class="fa-solid fa-location-dot"></i> COM3</span>
      <span class="chip">KR-MRT</span>
      <span class="chip">UTOWN</span>
      <span class="chip"><i class="fa-solid fa-plus"></i> Add</span>
    </div>
    <div class="stopcard">
      <div class="stopcard-head"><div class="rb sm" style="background:#003d7c"><i class="fa-solid fa-location-dot"></i></div>
        <div><div class="nm">COM3</div><div class="sub">School of Computing</div></div>
        <i class="fa-solid fa-thumbtack pin"></i></div>
      ${deprow('A1','To KR Terminal','FASS · BIZ · PGP · CLB','2',true,'9 min')}
      ${deprow('D1','To UTown','IT · Museum · LT13','5',false,'14 min')}
      ${deprow('D2','To KR MRT','UHC · UTown','7',false,'18 min')}
      ${deprow('K','To PGP','KR MRT · CLB · Kent Vale','11',false,'')}
    </div>
    <div class="stopcard">
      <div class="stopcard-head"><div class="rb sm" style="background:#003d7c"><i class="fa-solid fa-location-dot"></i></div>
        <div><div class="nm">KR-MRT <i class="fa-solid fa-flag-checkered" style="font-size:11px;color:var(--muted)"></i></div><div class="sub">Kent Ridge MRT · terminal</div></div></div>
      ${deprow('A2','To IT / UHC','UHC · TCOMS · Ventus','1',true,'12 min')}
      ${deprow('D2','To COM3','UTown · UHC','4',false,'')}
      ${deprow('A1','Arriving','from CLB','3',false,'',true)}
    </div>
  </div></div>`;
}

/* ---- view: Buses (active vehicles by route) ---- */
function busrow(plate, dest, via, eta, status){
  return `<div class="busrow">
    <span class="plate">${plate}</span>
    <div class="to"><b>→ ${dest}</b> <small>${via}</small></div>
    <span class="st ${status}"><span class="d2"></span>${status==='moving'?'Moving':'Stopped'}</span>
    <span class="et">${eta}</span>
  </div>`;
}
function routeblk(r, desc, n, rows){
  return `<div class="routeblk">
    <div class="routeblk-head r-${r}"><div class="rb sm" style="background:rgba(255,255,255,.22)">${r}</div>
      <div style="min-width:0"><div class="t">${r}</div><div class="d">${desc}</div></div>
      <span class="n">${n} bus${n===1?'':'es'}</span></div>
    ${rows}
  </div>`;
}
function viewBuses(){
  return `<div class="scroll"><div class="pad">
    <div class="chips">
      <span class="chip on">All</span>
      <span class="chip"><span class="sw r-A1"></span>A1</span>
      <span class="chip"><span class="sw r-A2"></span>A2</span>
      <span class="chip"><span class="sw r-D1"></span>D1</span>
      <span class="chip"><span class="sw r-D2"></span>D2</span>
      <span class="chip"><span class="sw r-K"></span>K</span>
      <span class="chip"><span class="sw r-R1"></span>R1</span>
    </div>
    ${routeblk('A1','KR Terminal loop',2,
      busrow('PA12&shy;34X','COM3','via CLB · 2 stops','2m', 'moving') +
      busrow('PA98&shy;21Y','PGP','via BIZ','6m', 'moving'))}
    ${routeblk('D1','COM3 loop',2,
      busrow('PC55&shy;02H','UTown','via Museum','3m', 'moving') +
      busrow('PC18&shy;77K','LT13','at IT now','—', 'stopped'))}
    ${routeblk('A2','KR Terminal (reverse)',1,
      busrow('PA44&shy;10B','UHC','via Opp KR MRT','4m','moving'))}
    <div class="sec-title" style="margin-top:6px">Not in service <span class="count">2 idle</span></div>
    <div class="chips" style="padding-top:0">
      <span class="chip"><i class="fa-solid fa-bus" style="color:#9aa3b0"></i> PD0091Z</span>
      <span class="chip"><i class="fa-solid fa-bus" style="color:#9aa3b0"></i> PD7740M</span>
    </div>
  </div></div>`;
}

/* ---- view: Map (full-bleed) ---- */
function viewMap(){
  return `<div class="mapwrap">
    <img src="../map-base.png" alt="NUS campus map" onerror="this.style.background='linear-gradient(135deg,#dfe6ef,#c4cfdd)';this.removeAttribute('src')">
    <svg viewBox="0 0 384 740" preserveAspectRatio="none">
      <path d="M70 120 C 150 80, 250 140, 300 240 S 230 470, 130 520 S 60 360, 70 120 Z" fill="none" stroke="#d62828" stroke-width="4" stroke-linecap="round" opacity=".9"/>
      <path d="M110 200 C 200 180, 280 260, 250 360 S 140 460, 110 380 S 90 250, 110 200" fill="none" stroke="#a855f7" stroke-width="4" stroke-linecap="round" opacity=".9"/>
      <path d="M150 560 C 220 520, 300 540, 320 460" fill="none" stroke="#1e40af" stroke-width="4" stroke-linecap="round" opacity=".9"/>
    </svg>
    <div class="busdot r-A1" style="left:300px;top:240px">A1</div>
    <div class="busdot r-A1" style="left:130px;top:520px">A1</div>
    <div class="busdot r-D1" style="left:250px;top:360px">D1</div>
    <div class="busdot r-K" style="left:320px;top:460px">K</div>
    <div class="map-stamp"><i class="fa-solid fa-clock"></i> baked 2m ago</div>
    <div class="map-fab" style="bottom:200px"><i class="fa-solid fa-expand"></i></div>
    <div class="map-fab" style="bottom:146px"><i class="fa-solid fa-location-crosshairs"></i></div>
    <div class="map-chips">
      <span class="chip on">All routes</span>
      <span class="chip"><span class="sw r-A1"></span>A1</span>
      <span class="chip"><span class="sw r-A2"></span>A2</span>
      <span class="chip"><span class="sw r-D1"></span>D1</span>
      <span class="chip"><span class="sw r-K"></span>K</span>
    </div>
  </div>`;
}

/* ---- view: Updates ---- */
function viewUpdates(){
  return `<div class="scroll"><div class="pad">
    <div class="card2">
      <div class="card2-head"><i class="fa-solid fa-triangle-exclamation"></i> Service Alerts</div>
      <div class="alert high"><div class="msg">A2 diverted near UHC due to roadworks. Expect 5–10 min delays.</div>
        <div class="meta"><span class="badge high">High</span><span><i class="fa-regular fa-calendar-xmark"></i> Until 6:00 PM</span></div></div>
      <div class="alert med"><div class="msg">D1 running reduced frequency during reading week.</div>
        <div class="meta"><span class="badge med">Medium</span><span><i class="fa-regular fa-calendar-xmark"></i> Until Fri</span></div></div>
    </div>
    <div class="card2">
      <div class="card2-head"><i class="fa-solid fa-bullhorn"></i> Announcements</div>
      <div class="ann"><div class="t">Extended hours for exam period start next Monday.</div><div class="w">2h ago</div></div>
      <div class="ann"><div class="t">New stop added at SDE3 — serviced by D1.</div><div class="w">Yesterday</div></div>
      <div class="ann"><div class="t">Public holiday schedule in effect this weekend.</div><div class="w">3 days ago</div></div>
    </div>
  </div></div>`;
}

/* ---- view: Health ---- */
function hrow(lbl, sub, lat, pill){
  return `<div class="hrow"><span class="st moving"><span class="d2"></span></span>
    <div class="lbl">${lbl}${sub?`<small>${sub}</small>`:''}</div>
    <span class="lat">${lat}</span><span class="pill ${pill}">${pill}</span></div>`;
}
function viewHealth(){
  return `<div class="scroll"><div class="pad">
    <div class="banner"><i class="fa-solid fa-circle-check"></i>
      <div><div class="t">All systems operational</div><div class="s">Backend · apps-script · checked 8s ago</div></div></div>
    <div class="sec-title">Checks</div>
    <div class="stack">
      ${hrow('FMS token — ActiveBus (A1)','', '42ms','ok')}
      ${hrow('ShuttleService (COM3)','', '88ms','ok')}
      ${hrow('TickerTapes','', '120ms','ok')}
      ${hrow('Announcements','', '64ms','ok')}
    </div>
    <div class="sec-title">Secrets</div>
    <div class="stack">
      ${hrow('NEXTBUS_FMS_TOKEN','a1b2…f9e0','required','valid')}
      ${hrow('NEXTBUS_FMS_SERVICE_ID','NUS','public','ok')}
      ${hrow('NEXTBUS_FMS_TENANT_CODE','NUS','public','ok')}
    </div>
  </div></div>`;
}

const VIEWS = { shuttle:viewShuttle, buses:viewBuses, map:viewMap, updates:viewUpdates, health:viewHealth };

function buildPhone(defaultView){
  const phone = document.createElement('div');
  phone.className = 'frame';
  const views = NAV.map(n =>
    `<div class="view ${n.k==='map'?'v-map':''} ${n.k===defaultView?'show':''}" data-view="${n.k}">${VIEWS[n.k]()}</div>`
  ).join('');
  phone.innerHTML = `
    <div class="phone"><div class="notch"></div><div class="screen">
      ${statusbar()}${appbar()}
      <div class="viewport" style="position:relative; flex:1; overflow:hidden;">${views}</div>
      ${tabbar(defaultView)}
    </div></div>
    <div class="cap">${NAV.find(n=>n.k===defaultView).label} <span>view</span></div>`;
  // wire nav
  phone.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    const k = t.dataset.go;
    phone.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x.dataset.go===k));
    phone.querySelectorAll('.view').forEach(v => v.classList.toggle('show', v.dataset.view===k));
    phone.querySelector('.cap').innerHTML = NAV.find(n=>n.k===k).label + ' <span>view</span>';
  }));
  return phone;
}

const gallery = document.getElementById('gallery');
['shuttle','buses','map','updates','health'].forEach(v => gallery.appendChild(buildPhone(v)));
</script>
