<!DOCTYPE html>
<!--
  Source for og-image.png (1200×630 social-share card).
  Regenerate after editing:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless=new --hide-scrollbars --window-size=1200,630 \
      --screenshot="og-image.png" "$(pwd)/og-card.html"
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background:
      radial-gradient(120% 120% at 100% 0%, rgba(239,124,0,0.20), transparent 55%),
      linear-gradient(135deg, #003d7c 0%, #00509e 100%);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 90px;
    gap: 64px;
  }
  .icon {
    flex: 0 0 auto;
    width: 300px; height: 300px;
    border-radius: 64px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.28);
  }
  .copy { display: flex; flex-direction: column; gap: 22px; }
  .eyebrow {
    font-size: 30px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: #ffd9b0;
  }
  h1 { font-size: 128px; font-weight: 800; line-height: 0.95; letter-spacing: -0.02em; }
  .accent { height: 10px; width: 200px; border-radius: 999px; background: #ef7c00; margin: 6px 0 4px; }
  p { font-size: 38px; font-weight: 500; color: rgba(255,255,255,0.92); line-height: 1.3; }
  .url { font-size: 30px; font-weight: 600; color: rgba(255,255,255,0.78); margin-top: 10px; }
</style>
</head>
<body>
  <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" rx="96" ry="96" fill="#ffffff"/>
    <rect x="96" y="156" width="320" height="208" rx="36" ry="36" fill="#003d7c"/>
    <rect x="116" y="180" width="84" height="64" rx="10" fill="#ffffff"/>
    <rect x="218" y="180" width="56" height="64" rx="6" fill="#ffffff"/>
    <rect x="296" y="180" width="56" height="64" rx="6" fill="#ffffff"/>
    <rect x="374" y="180" width="22" height="64" rx="4" fill="#ffffff"/>
    <rect x="96" y="296" width="320" height="14" fill="#ef7c00"/>
    <rect x="218" y="252" width="60" height="106" rx="6" fill="#ffffff"/>
    <circle cx="160" cy="386" r="42" fill="#1a2433"/>
    <circle cx="160" cy="386" r="22" fill="#ffffff"/>
    <circle cx="160" cy="386" r="10" fill="#1a2433"/>
    <circle cx="352" cy="386" r="42" fill="#1a2433"/>
    <circle cx="352" cy="386" r="22" fill="#ffffff"/>
    <circle cx="352" cy="386" r="10" fill="#1a2433"/>
  </svg>
  <div class="copy">
    <div class="eyebrow">NUS Internal Shuttle Bus</div>
    <h1>NUS ISB</h1>
    <div class="accent"></div>
    <p>Live shuttle arrivals, routes &amp; bus positions<br>across the NUS campus.</p>
    <div class="url">nusisb.ahlab.org</div>
  </div>
</body>
</html>
